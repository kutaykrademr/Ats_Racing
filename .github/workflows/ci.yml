name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Determine affected base
        id: nx-base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
            git fetch origin ${{ github.base_ref }} --depth=1
          else
            echo "base=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint
        run: npx nx affected -t lint --base=${{ steps.nx-base.outputs.base }} --head=HEAD --parallel=3

      - name: Test
        run: npx nx affected -t test --base=${{ steps.nx-base.outputs.base }} --head=HEAD --parallel=3 --passWithNoTests

      - name: Build
        run: npx nx affected -t build --base=${{ steps.nx-base.outputs.base }} --head=HEAD --parallel=3
