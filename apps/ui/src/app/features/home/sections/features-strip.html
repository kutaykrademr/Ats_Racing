<section class="care">
  <div class="care__top">
    <div class="care__copy">
      <h2 class="care__title">Aracının en iyi bakımını biz üstleniyoruz</h2>
      <p class="care__lead">
        Sed ut perspiciatis unde omnis. Garantili işçilik, ölçülebilir sonuçlar ve şeffaf süreç —
        her aracın dosyası bizde tutulur, her ayar belgelenir.
      </p>
      <a routerLink="/about" class="care__more">
        <span>Devamını oku</span>
        <span class="care__more-bar" aria-hidden="true"></span>
      </a>
    </div>

    <div class="care__hero" aria-hidden="true">
      <img
        src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1400&q=80"
        alt=""
        loading="lazy"
        decoding="async"
      />
    </div>
  </div>

  <div class="care__bottom">
    <div class="care__photo" aria-hidden="true">
      <img
        src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2?auto=format&fit=crop&w=1200&q=80"
        alt=""
        loading="lazy"
        decoding="async"
      />
    </div>
    <div class="care__pillars">
      @for (p of pillars; track p.title) {
        <section class="pillar">
          <h3>{{ p.title }}</h3>
          <p>{{ p.text }}</p>
        </section>
      }
    </div>
  </div>
</section>
