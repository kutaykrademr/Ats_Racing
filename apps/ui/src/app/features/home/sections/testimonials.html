<section class="testimonials section">
  <div class="container-page">
    <app-section-heading
      align="center"
      eyebrow="Müşterilerimiz Anlatıyor"
      title="Onlar Anlatıyor, Biz Üretiyoruz"
    ></app-section-heading>

    <p-carousel
      [value]="testimonials"
      [numVisible]="3"
      [numScroll]="1"
      [circular]="true"
      [autoplayInterval]="6000"
      [responsiveOptions]="responsive"
      styleClass="mt-12"
    >
      <ng-template #item let-t>
        <article class="quote-card">
          <span class="quote-card__mark" aria-hidden="true">“</span>
          <p class="quote-card__text">{{ t.quote }}</p>
          <footer class="quote-card__meta">
            <span class="quote-card__name">{{ t.name }}</span>
            <span class="quote-card__car">{{ t.car }}</span>
          </footer>
          <div class="quote-card__rating" [attr.aria-label]="t.rating + ' yıldız'">
            @for (_ of [].constructor(t.rating); track $index) {
              <i class="pi pi-star-fill"></i>
            }
          </div>
        </article>
      </ng-template>
    </p-carousel>
  </div>
</section>
