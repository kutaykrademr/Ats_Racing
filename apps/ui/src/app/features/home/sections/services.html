<section class="srv-tiles" aria-label="Hizmetlerimiz">
  <ul role="list">
    @for (svc of services; track svc.title) {
      <li class="srv-tile">
        <a [routerLink]="svc.link" class="srv-tile__link">
          <img [src]="svc.image" [alt]="svc.title" loading="lazy" decoding="async" />
          <div class="srv-tile__overlay" aria-hidden="true"></div>
          <div class="srv-tile__copy">
            <h3 class="srv-tile__title">{{ svc.title }}</h3>
            <p class="srv-tile__tag">{{ svc.tag }}</p>
          </div>
        </a>
      </li>
    }
  </ul>
</section>
