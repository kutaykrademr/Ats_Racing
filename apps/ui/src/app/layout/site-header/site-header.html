<header
  class="site-header"
  [class.is-scrolled]="scrolled()"
  [class.is-open]="mobileOpen()"
>
  <div class="site-header__bar">
    <nav class="site-header__nav-left" aria-label="Ana menü">
      <ul>
        @for (item of nav; track item.path) {
          <li>
            <a
              [routerLink]="item.path"
              routerLinkActive="is-active"
              [routerLinkActiveOptions]="{ exact: item.path === '/' }"
            >{{ item.label }}</a>
          </li>
        }
      </ul>
    </nav>

    <a
      routerLink="/"
      class="site-header__brand"
      aria-label="ATS Racing — Anasayfa"
      (click)="closeMobile()"
    >
      <img src="/logo.png" alt="ATS Racing" class="brand-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'" />
      <span class="brand-word" style="display:none">ATS<span class="brand-word__accent">racing</span></span>
    </a>

    <div class="site-header__actions">
      <a
        routerLink="/login"
        class="icon-btn icon-btn--accent"
        aria-label="Hesabım"
      >
        <i class="pi pi-user" aria-hidden="true"></i>
      </a>

      <button
        type="button"
        class="icon-btn icon-btn--burger"
        aria-label="Menü"
        [attr.aria-expanded]="mobileOpen()"
        (click)="toggleMobile()"
      >
        <i [class]="mobileOpen() ? 'pi pi-times' : 'pi pi-bars'" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  @if (mobileOpen()) {
    <nav class="site-header__mobile" aria-label="Mobil menü">
      <ul>
        @for (item of nav; track item.path) {
          <li>
            <a
              [routerLink]="item.path"
              routerLinkActive="is-active"
              [routerLinkActiveOptions]="{ exact: item.path === '/' }"
              (click)="closeMobile()"
            >{{ item.label }}</a>
          </li>
        }
        <li>
          <a routerLink="/login" (click)="closeMobile()">Giriş Yap</a>
        </li>
      </ul>
    </nav>
  }
</header>
